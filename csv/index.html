<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#222220">
<link rel="icon" href="../shared/favicon.svg">
<link rel="stylesheet" href="../shared/brand.css">
<title>CSV Viewer</title>
<style>
  /* CSV table view (tool-specific) */
  .csv-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
  .csv-table { border-collapse: collapse; font-size: 14px; white-space: nowrap; }
  .csv-table th, .csv-table td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
    max-width: 360px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .csv-table thead th {
    position: sticky;
    top: 0;
    background: var(--accent-tint);
    font-weight: 600;
    z-index: 1;
  }
  .csv-table tbody tr:nth-child(even) { background: #fafafa; }
  .csv-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rowcol {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <main class="uploader" id="uploader">
    <div id="langSlot" data-fixed="true"></div>

    <div class="brand">
      <span class="brand-logo" role="img" aria-label="Live Laugh Love">
        <img src="../shared/logo.svg" alt="LLL">
      </span>
      <span class="brand-name" data-i18n="brand">CSV Viewer</span>
    </div>

    <div class="dropzone" id="dropzone" role="button" tabindex="0"
         data-i18n-aria="dzAria" aria-label="Choose a CSV file to open">
      <div class="dz-icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/>
          <path d="M8 13h8"/><path d="M8 17h8"/><path d="M12 13v4"/>
        </svg>
      </div>
      <p class="dz-title" data-i18n="openTitle">Open a CSV file</p>
      <p class="dz-sub" data-i18n="openSub">Tap to choose a file from your device</p>
      <button class="btn" type="button" id="chooseBtn" data-i18n="chooseBtn">Choose file</button>
    </div>

    <p class="error hidden" id="error"></p>
    <p class="privacy" data-i18n="privacy">Your file stays on your device.</p>

    <input type="file" id="fileInput" accept=".csv,.tsv,text/csv" hidden>
  </main>

  <div class="viewer hidden" id="viewer">
    <div class="toolbar">
      <button class="tool-btn" type="button" id="backBtn" data-i18n-aria="backAria" aria-label="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        <span data-i18n="back">Back</span>
      </button>
      <span class="filename" id="filename"></span>
      <span class="rowcol" id="rowcol"></span>
    </div>
    <div class="csv-scroll"><table class="csv-table" id="csvTable"></table></div>
  </div>

  <script src="../shared/vendor/papaparse.min.js"></script>
  <script src="../shared/i18n.js"></script>
  <script>
    (function () {
      "use strict";

      var TOOL_STRINGS = {
        "ja": { brand: "CSV\u30d3\u30e5\u30fc\u30a2", openTitle: "CSV\u30d5\u30a1\u30a4\u30eb\u3092\u958b\u304f", openSub: "\u30bf\u30c3\u30d7\u3057\u3066\u30c7\u30d0\u30a4\u30b9\u304b\u3089\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e", privacy: "\u30d5\u30a1\u30a4\u30eb\u306f\u30c7\u30d0\u30a4\u30b9\u5185\u306b\u4fdd\u6301\u3055\u308c\u3001\u30b5\u30fc\u30d0\u30fc\u306b\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u308b\u3053\u3068\u306f\u3042\u308a\u307e\u305b\u3093\u3002.csv \u304a\u3088\u3073 .tsv \u30d5\u30a1\u30a4\u30eb\u306b\u5bfe\u5fdc\u3057\u3066\u3044\u307e\u3059\u3002", error: "CSV\u30d5\u30a1\u30a4\u30eb\u3067\u306f\u306a\u3044\u3088\u3046\u3067\u3059\u3002.csv \u307e\u305f\u306f .tsv \u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002", dzAria: "CSV\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u958b\u304f" },
        "en": { brand: "CSV Viewer", openTitle: "Open a CSV file", openSub: "Tap to choose a file from your device", privacy: "Your file stays on your device and is never uploaded to a server. Works with .csv and .tsv files.", error: "That doesn't look like a CSV file. Please pick a .csv or .tsv file.", dzAria: "Choose a CSV file to open" },
        "zh-Hans": { brand: "CSV \u67e5\u770b\u5668", openTitle: "\u6253\u5f00 CSV \u6587\u4ef6", openSub: "\u70b9\u51fb\u4ece\u8bbe\u5907\u4e2d\u9009\u62e9\u6587\u4ef6", privacy: "\u6587\u4ef6\u4fdd\u5b58\u5728\u60a8\u7684\u8bbe\u5907\u4e0a\uff0c\u4e0d\u4f1a\u4e0a\u4f20\u5230\u670d\u52a1\u5668\u3002\u652f\u6301 .csv \u548c .tsv \u6587\u4ef6\u3002", error: "\u8fd9\u4f3c\u4e4e\u4e0d\u662f CSV \u6587\u4ef6\u3002\u8bf7\u9009\u62e9 .csv \u6216 .tsv \u6587\u4ef6\u3002", dzAria: "\u9009\u62e9\u8981\u6253\u5f00\u7684 CSV \u6587\u4ef6" },
        "zh-Hant": { brand: "CSV \u6aa2\u8996\u5668", openTitle: "\u958b\u555f CSV \u6a94\u6848", openSub: "\u9ede\u9078\u5f9e\u88dd\u7f6e\u4e2d\u9078\u64c7\u6a94\u6848", privacy: "\u6a94\u6848\u4fdd\u5b58\u5728\u60a8\u7684\u88dd\u7f6e\u4e0a\uff0c\u4e0d\u6703\u4e0a\u50b3\u5230\u4f3a\u670d\u5668\u3002\u652f\u63f4 .csv \u548c .tsv \u6a94\u6848\u3002", error: "\u9019\u4f3c\u4e4e\u4e0d\u662f CSV \u6a94\u6848\u3002\u8acb\u9078\u64c7 .csv \u6216 .tsv \u6a94\u6848\u3002", dzAria: "\u9078\u64c7\u8981\u958b\u555f\u7684 CSV \u6a94\u6848" },
        "ko": { brand: "CSV \ubdf0\uc5b4", openTitle: "CSV \ud30c\uc77c \uc5f4\uae30", openSub: "\ud0ed\ud558\uc5ec \uae30\uae30\uc5d0\uc11c \ud30c\uc77c\uc744 \uc120\ud0dd\ud558\uc138\uc694", privacy: "\ud30c\uc77c\uc740 \uae30\uae30\uc5d0 \uc800\uc7a5\ub418\uba70 \uc11c\ubc84\uc5d0 \uc5c5\ub85c\ub4dc\ub418\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. .csv \ubc0f .tsv \ud30c\uc77c\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4.", error: "CSV \ud30c\uc77c\uc774 \uc544\ub2cc \uac83 \uac19\uc2b5\ub2c8\ub2e4. .csv \ub610\ub294 .tsv \ud30c\uc77c\uc744 \uc120\ud0dd\ud574 \uc8fc\uc138\uc694.", dzAria: "\uc5f4 CSV \ud30c\uc77c \uc120\ud0dd" },
        "ms": { brand: "Pemapar CSV", openTitle: "Buka fail CSV", openSub: "Ketik untuk memilih fail dari peranti anda", privacy: "Fail anda kekal pada peranti anda dan tidak dimuat naik ke pelayan. Menyokong fail .csv dan .tsv.", error: "Ini nampaknya bukan fail CSV. Sila pilih fail .csv atau .tsv.", dzAria: "Pilih fail CSV untuk dibuka" }
      };

      var fileInput = document.getElementById("fileInput");
      var dropzone  = document.getElementById("dropzone");
      var chooseBtn = document.getElementById("chooseBtn");
      var uploader  = document.getElementById("uploader");
      var viewer    = document.getElementById("viewer");
      var table     = document.getElementById("csvTable");
      var filename  = document.getElementById("filename");
      var rowcol    = document.getElementById("rowcol");
      var backBtn   = document.getElementById("backBtn");
      var errorEl   = document.getElementById("error");

      LLL_I18N.init(TOOL_STRINGS, {
        switcherHost: document.getElementById("langSlot"),
        onChange: function () {
          if (!errorEl.classList.contains("hidden")) errorEl.textContent = LLL_I18N.t("error");
        }
      });

      function isCsv(file) {
        var name = (file.name || "").toLowerCase();
        return name.endsWith(".csv") || name.endsWith(".tsv") ||
               file.type === "text/csv" || file.type === "text/tab-separated-values";
      }
      function showError() { errorEl.textContent = LLL_I18N.t("error"); errorEl.classList.remove("hidden"); }
      function clearError() { errorEl.classList.add("hidden"); }

      var NUM_RE = /^-?[\d,]*\.?\d+%?$/;
      function isNumeric(v) { return v !== "" && NUM_RE.test(v.trim()); }

      function buildTable(rows) {
        // Clear
        table.textContent = "";
        if (!rows.length) return;

        var maxCols = 0;
        for (var i = 0; i < rows.length; i++) if (rows[i].length > maxCols) maxCols = rows[i].length;

        var thead = document.createElement("thead");
        var htr = document.createElement("tr");
        var header = rows[0];
        for (var c = 0; c < maxCols; c++) {
          var th = document.createElement("th");
          th.textContent = header[c] != null ? header[c] : "";
          th.title = th.textContent;
          htr.appendChild(th);
        }
        thead.appendChild(htr);
        table.appendChild(thead);

        var tbody = document.createElement("tbody");
        for (var r = 1; r < rows.length; r++) {
          var tr = document.createElement("tr");
          var row = rows[r];
          for (var cc = 0; cc < maxCols; cc++) {
            var td = document.createElement("td");
            var val = row[cc] != null ? row[cc] : "";
            td.textContent = val;
            td.title = val;
            if (isNumeric(val)) td.className = "num";
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
        table.appendChild(tbody);

        rowcol.textContent = (rows.length - 1) + " \u00d7 " + maxCols; // data rows × columns
      }

      function openFile(file) {
        if (!file) return;
        if (!isCsv(file)) { showError(); return; }
        clearError();
        var isTsv = (file.name || "").toLowerCase().endsWith(".tsv");
        Papa.parse(file, {
          delimiter: isTsv ? "\t" : "",
          skipEmptyLines: "greedy",
          complete: function (res) {
            buildTable(res.data || []);
            filename.textContent = file.name;
            uploader.classList.add("hidden");
            viewer.classList.remove("hidden");
            document.querySelector(".csv-scroll").scrollTop = 0;
          },
          error: function () { showError(); }
        });
      }

      function closeViewer() {
        viewer.classList.add("hidden");
        uploader.classList.remove("hidden");
        table.textContent = "";
        fileInput.value = "";
      }

      function pick() { fileInput.click(); }

      chooseBtn.addEventListener("click", function (e) { e.stopPropagation(); pick(); });
      dropzone.addEventListener("click", pick);
      dropzone.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); }
      });
      fileInput.addEventListener("change", function (e) { openFile(e.target.files[0]); });
      ["dragenter", "dragover"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.add("dragging"); });
      });
      ["dragleave", "drop"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.remove("dragging"); });
      });
      dropzone.addEventListener("drop", function (e) {
        var files = e.dataTransfer && e.dataTransfer.files;
        if (files && files.length) openFile(files[0]);
      });
      backBtn.addEventListener("click", closeViewer);
    })();
  </script>
</body>
</html>
