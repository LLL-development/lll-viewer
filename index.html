<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#222220">
<link rel="icon" href="shared/favicon.svg">
<link rel="stylesheet" href="shared/brand.css">
<title>LLL Tools</title>
<style>
  .page {
    position: relative;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    padding-top: max(72px, calc(env(safe-area-inset-top) + 56px));
  }
  .hero { text-align: center; margin-bottom: 36px; }
  .hero-logo img { height: 46px; width: auto; display: inline-block; }
  .hero-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 18px 0 6px; }
  .hero-sub { font-size: 15px; color: var(--muted); margin: 0; }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    width: 100%;
    max-width: 460px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color .15s ease, transform .1s ease;
  }
  a.card:hover { border-color: var(--accent); }
  a.card:active { transform: scale(0.99); }
  a.card:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .card.soon { opacity: 0.6; cursor: default; }

  .card-icon {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 11px;
    background: var(--accent-tint);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 13px;
  }
  .card-text { min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .card-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .badge {
    font-size: 11px; font-weight: 600; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 8px; margin-left: auto; flex: none;
  }
</style>
</head>
<body>
  <div class="page">
    <div id="langSlot" data-fixed="true"></div>

    <div class="hero">
      <div class="hero-logo"><img src="shared/logo.svg" alt="Live Laugh Love"></div>
      <h1 class="hero-title" data-i18n="heroTitle">LLL Tools</h1>
      <p class="hero-sub" data-i18n="heroSub">Handy file tools for your phone</p>
    </div>

    <div class="grid">
      <a class="card" href="html/" data-i18n-aria="htmlName" aria-label="HTML Viewer">
        <span class="card-icon" aria-hidden="true">&lt;/&gt;</span>
        <span class="card-text">
          <div class="card-name" data-i18n="htmlName">HTML Viewer</div>
          <div class="card-desc" data-i18n="htmlDesc">Open HTML files</div>
        </span>
      </a>

      <a class="card" href="md/" data-i18n-aria="mdName" aria-label="Markdown Viewer">
        <span class="card-icon" aria-hidden="true">md</span>
        <span class="card-text">
          <div class="card-name" data-i18n="mdName">Markdown Viewer</div>
          <div class="card-desc" data-i18n="mdDesc">Open Markdown files</div>
        </span>
      </a>

      <div class="card soon">
        <span class="card-icon" aria-hidden="true">pdf</span>
        <span class="card-text">
          <div class="card-name">PDF Viewer</div>
          <div class="card-desc">Open PDF files</div>
        </span>
        <span class="badge" data-i18n="soon">Soon</span>
      </div>

      <div class="card soon">
        <span class="card-icon" aria-hidden="true">csv</span>
        <span class="card-text">
          <div class="card-name">CSV Viewer</div>
          <div class="card-desc">Open CSV files</div>
        </span>
        <span class="badge" data-i18n="soon">Soon</span>
      </div>
    </div>
  </div>

  <script src="shared/i18n.js"></script>
  <script>
    (function () {
      "use strict";
      var LANDING = {
        "ja": { heroTitle: "LLL \u30c4\u30fc\u30eb", heroSub: "\u30b9\u30de\u30db\u3067\u4f7f\u3048\u308b\u4fbf\u5229\u306a\u30d5\u30a1\u30a4\u30eb\u30c4\u30fc\u30eb", htmlName: "HTML\u30d3\u30e5\u30fc\u30a2", htmlDesc: "HTML\u30d5\u30a1\u30a4\u30eb\u3092\u958b\u304f", mdName: "Markdown\u30d3\u30e5\u30fc\u30a2", mdDesc: "Markdown\u30d5\u30a1\u30a4\u30eb\u3092\u958b\u304f", soon: "\u8fd1\u65e5\u516c\u958b" },
        "en": { heroTitle: "LLL Tools", heroSub: "Handy file tools for your phone", htmlName: "HTML Viewer", htmlDesc: "Open HTML files", mdName: "Markdown Viewer", mdDesc: "Open Markdown files", soon: "Soon" },
        "zh-Hans": { heroTitle: "LLL \u5de5\u5177", heroSub: "\u624b\u673a\u4e0a\u7684\u5b9e\u7528\u6587\u4ef6\u5de5\u5177", htmlName: "HTML \u67e5\u770b\u5668", htmlDesc: "\u6253\u5f00 HTML \u6587\u4ef6", mdName: "Markdown \u67e5\u770b\u5668", mdDesc: "\u6253\u5f00 Markdown \u6587\u4ef6", soon: "\u5373\u5c06\u63a8\u51fa" },
        "zh-Hant": { heroTitle: "LLL \u5de5\u5177", heroSub: "\u624b\u6a5f\u4e0a\u7684\u5be6\u7528\u6a94\u6848\u5de5\u5177", htmlName: "HTML \u6aa2\u8996\u5668", htmlDesc: "\u958b\u555f HTML \u6a94\u6848", mdName: "Markdown \u6aa2\u8996\u5668", mdDesc: "\u958b\u555f Markdown \u6a94\u6848", soon: "\u5373\u5c07\u63a8\u51fa" },
        "ko": { heroTitle: "LLL \ub3c4\uad6c", heroSub: "\ud734\ub300\ud3f0\uc6a9 \ud3b8\ub9ac\ud55c \ud30c\uc77c \ub3c4\uad6c", htmlName: "HTML \ubdf0\uc5b4", htmlDesc: "HTML \ud30c\uc77c \uc5f4\uae30", mdName: "Markdown \ubdf0\uc5b4", mdDesc: "Markdown \ud30c\uc77c \uc5f4\uae30", soon: "\uacf5\uac1c \uc608\uc815" },
        "ms": { heroTitle: "Alat LLL", heroSub: "Alat fail berguna untuk telefon anda", htmlName: "Pemapar HTML", htmlDesc: "Buka fail HTML", mdName: "Pemapar Markdown", mdDesc: "Buka fail Markdown", soon: "Akan datang" }
      };
      LLL_I18N.init(LANDING, { switcherHost: document.getElementById("langSlot") });
    })();
  </script>
</body>
</html>
