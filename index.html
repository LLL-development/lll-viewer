<title>HTML Viewer</title>
<style>
  :root {
    --bg: #f3f3f2;
    --surface: #ffffff;
    --ink: #222220;
    --muted: #6f6f6a;
    --border: #e3e3e0;
    --accent: #222220;
    --accent-tint: #ececea;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
            "Hiragino Sans", "Noto Sans CJK JP", "Noto Sans KR", "Microsoft YaHei", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Upload screen ---------- */
  .uploader {
    position: relative;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 28px;
  }

  /* Language switcher */
  .lang-switch {
    position: absolute;
    top: max(16px, env(safe-area-inset-top));
    right: 16px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 8px 6px 10px;
  }
  .lang-switch svg { color: var(--muted); flex: none; }
  .lang-switch select {
    border: none;
    background: transparent;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink);
    cursor: pointer;
  }
  .lang-switch:focus-within {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-name {
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }
  .brand-logo { flex: none; line-height: 0; }
  .brand-name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .dropzone {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .dropzone:hover { border-color: var(--accent); }
  .dropzone:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .dropzone.dragging { border-color: var(--accent); background: var(--accent-tint); }

  .dz-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    border-radius: 12px;
    background: var(--accent-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }
  .dz-title { font-size: 17px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  .dz-sub { font-size: 14px; color: var(--muted); margin: 0 0 22px; }

  .btn {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    min-height: 46px;
    cursor: pointer;
    transition: filter .15s ease;
  }
  .btn:hover { filter: brightness(1.07); }
  .btn:active { filter: brightness(0.95); }

  .privacy {
    font-size: 13px;
    color: var(--muted);
    max-width: 440px;
    text-align: center;
    line-height: 1.6;
  }

  .error {
    color: #b42318;
    background: #fef3f2;
    border: 1px solid #fda29b;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    max-width: 440px;
    text-align: center;
  }

  /* ---------- Viewer screen ---------- */
  .viewer {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    padding-top: max(10px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tool-btn {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 12px;
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .tool-btn:hover { background: var(--bg); }
  .tool-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

  .filename {
    flex: 1;
    min-width: 0;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: center;
  }
  .frame { flex: 1; width: 100%; border: none; background: #fff; }

  .hidden { display: none !important; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>

  <!-- Viewer screen -->

  <script>
    (function () {
      "use strict";

      /* ---------- Translations ---------- */
      var I18N = {
        "ja": {
          brand: "HTMLビューア",
          openTitle: "HTMLファイルを開く",
          openSub: "タップしてデバイスからファイルを選択",
          chooseBtn: "ファイルを選択",
          privacy: "ファイルはデバイス内に保持され、サーバーにアップロードされることはありません。.html および .htm ファイルに対応しています。",
          error: "HTMLファイルではないようです。.html または .htm ファイルを選択してください。",
          back: "戻る",
          newTab: "新しいタブ",
          dzAria: "HTMLファイルを選択して開く",
          backAria: "アップロード画面に戻る",
          newTabAria: "新しいタブで開く",
          langAria: "言語"
        },
        "en": {
          brand: "HTML Viewer",
          openTitle: "Open an HTML file",
          openSub: "Tap to choose a file from your device",
          chooseBtn: "Choose file",
          privacy: "Your file stays on your device and is never uploaded to a server. Works with .html and .htm files.",
          error: "That doesn't look like an HTML file. Please pick a .html or .htm file.",
          back: "Back",
          newTab: "New tab",
          dzAria: "Choose an HTML file to open",
          backAria: "Back to upload",
          newTabAria: "Open in a new tab",
          langAria: "Language"
        },
        "zh-Hans": {
          brand: "HTML 查看器",
          openTitle: "打开 HTML 文件",
          openSub: "点击从设备中选择文件",
          chooseBtn: "选择文件",
          privacy: "文件保存在您的设备上，不会上传到服务器。支持 .html 和 .htm 文件。",
          error: "这似乎不是 HTML 文件。请选择 .html 或 .htm 文件。",
          back: "返回",
          newTab: "新标签页",
          dzAria: "选择要打开的 HTML 文件",
          backAria: "返回上传页面",
          newTabAria: "在新标签页中打开",
          langAria: "语言"
        },
        "zh-Hant": {
          brand: "HTML 檢視器",
          openTitle: "開啟 HTML 檔案",
          openSub: "點選從裝置中選擇檔案",
          chooseBtn: "選擇檔案",
          privacy: "檔案保存在您的裝置上，不會上傳到伺服器。支援 .html 和 .htm 檔案。",
          error: "這似乎不是 HTML 檔案。請選擇 .html 或 .htm 檔案。",
          back: "返回",
          newTab: "新分頁",
          dzAria: "選擇要開啟的 HTML 檔案",
          backAria: "返回上傳頁面",
          newTabAria: "在新分頁中開啟",
          langAria: "語言"
        },
        "ko": {
          brand: "HTML 뷰어",
          openTitle: "HTML 파일 열기",
          openSub: "탭하여 기기에서 파일을 선택하세요",
          chooseBtn: "파일 선택",
          privacy: "파일은 기기에 저장되며 서버에 업로드되지 않습니다. .html 및 .htm 파일을 지원합니다.",
          error: "HTML 파일이 아닌 것 같습니다. .html 또는 .htm 파일을 선택해 주세요.",
          back: "뒤로",
          newTab: "새 탭",
          dzAria: "열 HTML 파일 선택",
          backAria: "업로드 화면으로 돌아가기",
          newTabAria: "새 탭에서 열기",
          langAria: "언어"
        },
        "ms": {
          brand: "Pemapar HTML",
          openTitle: "Buka fail HTML",
          openSub: "Ketik untuk memilih fail dari peranti anda",
          chooseBtn: "Pilih fail",
          privacy: "Fail anda kekal pada peranti anda dan tidak dimuat naik ke pelayan. Menyokong fail .html dan .htm.",
          error: "Ini nampaknya bukan fail HTML. Sila pilih fail .html atau .htm.",
          back: "Kembali",
          newTab: "Tab baharu",
          dzAria: "Pilih fail HTML untuk dibuka",
          backAria: "Kembali ke muat naik",
          newTabAria: "Buka dalam tab baharu",
          langAria: "Bahasa"
        }
      };

      var DEFAULT_LANG = "ja";
      var STORAGE_KEY = "lll_html_lang";
      var currentDict = I18N[DEFAULT_LANG];

      /* ---------- Elements ---------- */
      var fileInput = document.getElementById("fileInput");
      var dropzone  = document.getElementById("dropzone");
      var chooseBtn = document.getElementById("chooseBtn");
      var uploader  = document.getElementById("uploader");
      var viewer    = document.getElementById("viewer");
      var frame     = document.getElementById("frame");
      var filename  = document.getElementById("filename");
      var backBtn   = document.getElementById("backBtn");
      var newTabBtn = document.getElementById("newTabBtn");
      var errorEl   = document.getElementById("error");
      var langSelect = document.getElementById("langSelect");

      var currentUrl = null;

      /* ---------- Storage (safe, degrades gracefully) ---------- */
      function safeGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
      function safeSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

      /* ---------- Language ---------- */
      function applyLang(code) {
        var dict = I18N[code] || I18N[DEFAULT_LANG];
        currentDict = dict;

        document.documentElement.lang = code;
        document.title = dict.brand;

        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          var key = el.getAttribute("data-i18n");
          if (dict[key] != null) el.textContent = dict[key];
        });
        document.querySelectorAll("[data-i18n-aria]").forEach(function (el) {
          var key = el.getAttribute("data-i18n-aria");
          if (dict[key] != null) el.setAttribute("aria-label", dict[key]);
        });

        langSelect.value = code;
        safeSet(STORAGE_KEY, code);

        if (!errorEl.classList.contains("hidden")) errorEl.textContent = dict.error;
      }

      langSelect.addEventListener("change", function (e) { applyLang(e.target.value); });

      /* ---------- File handling ---------- */
      function isHtml(file) {
        var name = (file.name || "").toLowerCase();
        return name.endsWith(".html") || name.endsWith(".htm") || file.type === "text/html";
      }

      function showError() {
        errorEl.textContent = currentDict.error;
        errorEl.classList.remove("hidden");
      }
      function clearError() { errorEl.classList.add("hidden"); }

      function openFile(file) {
        if (!file) return;
        if (!isHtml(file)) { showError(); return; }
        clearError();

        if (currentUrl) URL.revokeObjectURL(currentUrl);
        currentUrl = URL.createObjectURL(file);

        frame.src = currentUrl;
        filename.textContent = file.name;

        uploader.classList.add("hidden");
        viewer.classList.remove("hidden");
      }

      function closeViewer() {
        viewer.classList.add("hidden");
        uploader.classList.remove("hidden");
        frame.src = "about:blank";
        if (currentUrl) { URL.revokeObjectURL(currentUrl); currentUrl = null; }
        fileInput.value = "";
      }

      function pick() { fileInput.click(); }

      chooseBtn.addEventListener("click", function (e) { e.stopPropagation(); pick(); });
      dropzone.addEventListener("click", pick);
      dropzone.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); }
      });
      fileInput.addEventListener("change", function (e) { openFile(e.target.files[0]); });

      ["dragenter", "dragover"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.add("dragging"); });
      });
      ["dragleave", "drop"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.remove("dragging"); });
      });
      dropzone.addEventListener("drop", function (e) {
        var files = e.dataTransfer && e.dataTransfer.files;
        if (files && files.length) openFile(files[0]);
      });

      backBtn.addEventListener("click", closeViewer);
      newTabBtn.addEventListener("click", function () {
        if (currentUrl) window.open(currentUrl, "_blank");
      });

      /* ---------- Init ---------- */
      var stored = safeGet(STORAGE_KEY);
      applyLang(stored && I18N[stored] ? stored : DEFAULT_LANG);
    })();
  </script>
