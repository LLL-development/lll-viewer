<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#222220">
<link rel="icon" href="../shared/favicon.svg">
<link rel="stylesheet" href="../shared/brand.css">
<title>Markdown Viewer</title>
<style>
  /* Markdown reading view (tool-specific) */
  .md-scroll { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; }
  .md-body {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 64px;
    padding-bottom: max(64px, env(safe-area-inset-bottom));
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink);
    word-wrap: break-word;
  }
  .md-body > *:first-child { margin-top: 0; }
  .md-body h1, .md-body h2, .md-body h3,
  .md-body h4, .md-body h5, .md-body h6 {
    line-height: 1.3; margin: 1.6em 0 0.6em; font-weight: 700; letter-spacing: -0.01em;
  }
  .md-body h1 { font-size: 1.8em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  .md-body h2 { font-size: 1.45em; padding-bottom: .3em; border-bottom: 1px solid var(--border); }
  .md-body h3 { font-size: 1.2em; }
  .md-body h4 { font-size: 1.05em; }
  .md-body p, .md-body ul, .md-body ol, .md-body blockquote, .md-body table, .md-body pre { margin: 0 0 1em; }
  .md-body ul, .md-body ol { padding-left: 1.5em; }
  .md-body li { margin: 0.25em 0; }
  .md-body a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }
  .md-body code {
    font-family: var(--mono); font-size: 0.88em;
    background: var(--accent-tint); padding: 0.15em 0.4em; border-radius: 5px;
  }
  .md-body pre {
    background: #1f1f1d; color: #f4f4f2; padding: 14px 16px;
    border-radius: 10px; overflow-x: auto;
  }
  .md-body pre code { background: none; padding: 0; font-size: 0.85em; color: inherit; }
  .md-body blockquote {
    margin-left: 0; padding: 0.2em 1em; color: var(--muted);
    border-left: 3px solid var(--border);
  }
  .md-body img { max-width: 100%; height: auto; border-radius: 8px; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 1.6em 0; }
  .md-body table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; }
  .md-body th, .md-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .md-body th { background: var(--accent-tint); font-weight: 600; }
</style>
</head>
<body>

  <main class="uploader" id="uploader">
    <div id="langSlot" data-fixed="true"></div>

    <div class="brand">
      <span class="brand-logo" role="img" aria-label="Live Laugh Love">
        <img src="../shared/logo.svg" alt="LLL">
      </span>
      <span class="brand-name" data-i18n="brand">Markdown Viewer</span>
    </div>

    <div class="dropzone" id="dropzone" role="button" tabindex="0"
         data-i18n-aria="dzAria" aria-label="Choose a Markdown file to open">
      <div class="dz-icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/>
          <path d="M8 13h1.5l1.5 2 1.5-2H14"/>
          <path d="M8 17v-4"/><path d="M14 13v4"/>
        </svg>
      </div>
      <p class="dz-title" data-i18n="openTitle">Open a Markdown file</p>
      <p class="dz-sub" data-i18n="openSub">Tap to choose a file from your device</p>
      <button class="btn" type="button" id="chooseBtn" data-i18n="chooseBtn">Choose file</button>
    </div>

    <p class="error hidden" id="error"></p>
    <p class="privacy" data-i18n="privacy">Your file stays on your device.</p>

    <input type="file" id="fileInput" accept=".md,.markdown,text/markdown" hidden>
  </main>

  <div class="viewer hidden" id="viewer">
    <div class="toolbar">
      <button class="tool-btn" type="button" id="backBtn" data-i18n-aria="backAria" aria-label="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        <span data-i18n="back">Back</span>
      </button>
      <span class="filename" id="filename"></span>
      <button class="tool-btn" type="button" id="newTabBtn" data-i18n-aria="newTabAria" aria-label="New tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <path d="M15 3h6v6"/><path d="M10 14L21 3"/>
        </svg>
        <span data-i18n="newTab">New tab</span>
      </button>
    </div>
    <div class="md-scroll"><article class="md-body" id="mdBody"></article></div>
  </div>

  <script src="../shared/vendor/marked.min.js"></script>
  <script src="../shared/vendor/purify.min.js"></script>
  <script src="../shared/i18n.js"></script>
  <script>
    (function () {
      "use strict";

      var TOOL_STRINGS = {
        "ja": { brand: "Markdown\u30d3\u30e5\u30fc\u30a2", openTitle: "Markdown\u30d5\u30a1\u30a4\u30eb\u3092\u958b\u304f", openSub: "\u30bf\u30c3\u30d7\u3057\u3066\u30c7\u30d0\u30a4\u30b9\u304b\u3089\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e", privacy: "\u30d5\u30a1\u30a4\u30eb\u306f\u30c7\u30d0\u30a4\u30b9\u5185\u306b\u4fdd\u6301\u3055\u308c\u3001\u30b5\u30fc\u30d0\u30fc\u306b\u30a2\u30c3\u30d7\u30ed\u30fc\u30c9\u3055\u308c\u308b\u3053\u3068\u306f\u3042\u308a\u307e\u305b\u3093\u3002.md \u304a\u3088\u3073 .markdown \u30d5\u30a1\u30a4\u30eb\u306b\u5bfe\u5fdc\u3057\u3066\u3044\u307e\u3059\u3002", error: "Markdown\u30d5\u30a1\u30a4\u30eb\u3067\u306f\u306a\u3044\u3088\u3046\u3067\u3059\u3002.md \u307e\u305f\u306f .markdown \u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002", dzAria: "Markdown\u30d5\u30a1\u30a4\u30eb\u3092\u9078\u629e\u3057\u3066\u958b\u304f" },
        "en": { brand: "Markdown Viewer", openTitle: "Open a Markdown file", openSub: "Tap to choose a file from your device", privacy: "Your file stays on your device and is never uploaded to a server. Works with .md and .markdown files.", error: "That doesn't look like a Markdown file. Please pick a .md or .markdown file.", dzAria: "Choose a Markdown file to open" },
        "zh-Hans": { brand: "Markdown \u67e5\u770b\u5668", openTitle: "\u6253\u5f00 Markdown \u6587\u4ef6", openSub: "\u70b9\u51fb\u4ece\u8bbe\u5907\u4e2d\u9009\u62e9\u6587\u4ef6", privacy: "\u6587\u4ef6\u4fdd\u5b58\u5728\u60a8\u7684\u8bbe\u5907\u4e0a\uff0c\u4e0d\u4f1a\u4e0a\u4f20\u5230\u670d\u52a1\u5668\u3002\u652f\u6301 .md \u548c .markdown \u6587\u4ef6\u3002", error: "\u8fd9\u4f3c\u4e4e\u4e0d\u662f Markdown \u6587\u4ef6\u3002\u8bf7\u9009\u62e9 .md \u6216 .markdown \u6587\u4ef6\u3002", dzAria: "\u9009\u62e9\u8981\u6253\u5f00\u7684 Markdown \u6587\u4ef6" },
        "zh-Hant": { brand: "Markdown \u6aa2\u8996\u5668", openTitle: "\u958b\u555f Markdown \u6a94\u6848", openSub: "\u9ede\u9078\u5f9e\u88dd\u7f6e\u4e2d\u9078\u64c7\u6a94\u6848", privacy: "\u6a94\u6848\u4fdd\u5b58\u5728\u60a8\u7684\u88dd\u7f6e\u4e0a\uff0c\u4e0d\u6703\u4e0a\u50b3\u5230\u4f3a\u670d\u5668\u3002\u652f\u63f4 .md \u548c .markdown \u6a94\u6848\u3002", error: "\u9019\u4f3c\u4e4e\u4e0d\u662f Markdown \u6a94\u6848\u3002\u8acb\u9078\u64c7 .md \u6216 .markdown \u6a94\u6848\u3002", dzAria: "\u9078\u64c7\u8981\u958b\u555f\u7684 Markdown \u6a94\u6848" },
        "ko": { brand: "Markdown \ubdf0\uc5b4", openTitle: "Markdown \ud30c\uc77c \uc5f4\uae30", openSub: "\ud0ed\ud558\uc5ec \uae30\uae30\uc5d0\uc11c \ud30c\uc77c\uc744 \uc120\ud0dd\ud558\uc138\uc694", privacy: "\ud30c\uc77c\uc740 \uae30\uae30\uc5d0 \uc800\uc7a5\ub418\uba70 \uc11c\ubc84\uc5d0 \uc5c5\ub85c\ub4dc\ub418\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. .md \ubc0f .markdown \ud30c\uc77c\uc744 \uc9c0\uc6d0\ud569\ub2c8\ub2e4.", error: "Markdown \ud30c\uc77c\uc774 \uc544\ub2cc \uac83 \uac19\uc2b5\ub2c8\ub2e4. .md \ub610\ub294 .markdown \ud30c\uc77c\uc744 \uc120\ud0dd\ud574 \uc8fc\uc138\uc694.", dzAria: "\uc5f4 Markdown \ud30c\uc77c \uc120\ud0dd" },
        "ms": { brand: "Pemapar Markdown", openTitle: "Buka fail Markdown", openSub: "Ketik untuk memilih fail dari peranti anda", privacy: "Fail anda kekal pada peranti anda dan tidak dimuat naik ke pelayan. Menyokong fail .md dan .markdown.", error: "Ini nampaknya bukan fail Markdown. Sila pilih fail .md atau .markdown.", dzAria: "Pilih fail Markdown untuk dibuka" }
      };

      var fileInput = document.getElementById("fileInput");
      var dropzone  = document.getElementById("dropzone");
      var chooseBtn = document.getElementById("chooseBtn");
      var uploader  = document.getElementById("uploader");
      var viewer    = document.getElementById("viewer");
      var mdBody    = document.getElementById("mdBody");
      var filename  = document.getElementById("filename");
      var backBtn   = document.getElementById("backBtn");
      var newTabBtn = document.getElementById("newTabBtn");
      var errorEl   = document.getElementById("error");

      var lastHtml = "";
      var lastName = "";
      var newTabUrl = null;

      LLL_I18N.init(TOOL_STRINGS, {
        switcherHost: document.getElementById("langSlot"),
        onChange: function () {
          if (!errorEl.classList.contains("hidden")) errorEl.textContent = LLL_I18N.t("error");
        }
      });

      marked.setOptions({ gfm: true, breaks: false });

      function isMarkdown(file) {
        var name = (file.name || "").toLowerCase();
        return name.endsWith(".md") || name.endsWith(".markdown") || file.type === "text/markdown";
      }
      function showError() { errorEl.textContent = LLL_I18N.t("error"); errorEl.classList.remove("hidden"); }
      function clearError() { errorEl.classList.add("hidden"); }

      function render(text, name) {
        var rawHtml = marked.parse(text);
        var clean = DOMPurify.sanitize(rawHtml, { USE_PROFILES: { html: true } });
        lastHtml = clean;
        lastName = name;
        mdBody.innerHTML = clean;
        filename.textContent = name;
        uploader.classList.add("hidden");
        viewer.classList.remove("hidden");
        document.querySelector(".md-scroll").scrollTop = 0;
      }

      function openFile(file) {
        if (!file) return;
        if (!isMarkdown(file)) { showError(); return; }
        clearError();
        var reader = new FileReader();
        reader.onload = function (e) { render(String(e.target.result || ""), file.name); };
        reader.onerror = function () { showError(); };
        reader.readAsText(file);
      }

      function closeViewer() {
        viewer.classList.add("hidden");
        uploader.classList.remove("hidden");
        mdBody.innerHTML = "";
        if (newTabUrl) { URL.revokeObjectURL(newTabUrl); newTabUrl = null; }
        fileInput.value = "";
      }

      function openInNewTab() {
        if (!lastHtml) return;
        // Build a standalone, styled HTML document from the sanitized content.
        var css = document.querySelector("style").textContent;
        var doc = "<!DOCTYPE html><html><head><meta charset='utf-8'>" +
                  "<meta name='viewport' content='width=device-width, initial-scale=1'>" +
                  "<title>" + (lastName || "Markdown") + "</title>" +
                  "<style>body{margin:0;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#222220;}" +
                  css + "</style></head><body><article class='md-body'>" +
                  lastHtml + "</article></body></html>";
        var blob = new Blob([doc], { type: "text/html" });
        if (newTabUrl) URL.revokeObjectURL(newTabUrl);
        newTabUrl = URL.createObjectURL(blob);
        window.open(newTabUrl, "_blank");
      }

      function pick() { fileInput.click(); }

      chooseBtn.addEventListener("click", function (e) { e.stopPropagation(); pick(); });
      dropzone.addEventListener("click", pick);
      dropzone.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(); }
      });
      fileInput.addEventListener("change", function (e) { openFile(e.target.files[0]); });
      ["dragenter", "dragover"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.add("dragging"); });
      });
      ["dragleave", "drop"].forEach(function (evt) {
        dropzone.addEventListener(evt, function (e) { e.preventDefault(); dropzone.classList.remove("dragging"); });
      });
      dropzone.addEventListener("drop", function (e) {
        var files = e.dataTransfer && e.dataTransfer.files;
        if (files && files.length) openFile(files[0]);
      });
      backBtn.addEventListener("click", closeViewer);
      newTabBtn.addEventListener("click", openInNewTab);
    })();
  </script>
</body>
</html>
